version: 2
updates:
  # JS dependencies (package.json). Security updates land immediately via
  # Dependabot alerts; these are the scheduled version bumps.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev/minor bumps into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions in our workflows current + patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
