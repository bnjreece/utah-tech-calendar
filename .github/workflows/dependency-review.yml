name: Dependency Review

# Blocks PRs that add dependencies with known vulnerabilities or
# disallowed licenses. PR-only; free for public repositories.
on: pull_request

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
