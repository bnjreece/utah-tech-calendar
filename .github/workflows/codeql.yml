name: CodeQL

# Static analysis (SAST) for JS/TS: catches injection, unsafe sinks,
# tainted-data flows. Runs on push, PRs, and weekly. Do NOT also enable
# CodeQL "default setup" in repo settings - it conflicts with this
# advanced workflow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
