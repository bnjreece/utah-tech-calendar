name: gitleaks

# Secret scanning on push + PR. The local pre-commit gitleaks hook only
# protects committers who installed it; this covers fork PRs and anyone
# without the hook. Free for public repositories.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    # Skip Dependabot PR-events: their restricted GITHUB_TOKEN breaks the
    # action's PR-commits API call, and Dependabot branches are already
    # scanned by the push event. Human/fork PRs still get scanned.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
